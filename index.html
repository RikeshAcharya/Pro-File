  <style>
	:root{
		--clock-size: 320px;
		--bg-color:black;
		--clock-face:white;
		--accent-color:red;
	}
	
	body{
	display:flex;
	justify-content:center;
	align-items:center;
	height:100vh;
	margin:0;
	background:white;
	font-family:'Arial',sans-serif;
		}
		.clock{
		width: var(--clock-size);
		height: var(--clock-size);
		background:var(--clock-face);
		border:5px solid gray;
		border-radius:50%;
		position:relative;
		}
		.insideClock{
		position:absolute;
		width:100%;
		height:100%;
		display:flex;
		justify-content:center;
		align-items:center;
		}
		.hand{
		position:absolute;
		bottom:50%;
		left:50%;
		transform-origin:bottom;
		border-radius:1px;
		transform:translateX(-50%);
		transition:transform 0.1s cubic-bezier(0.4,2.08,0.55,0.44);
		}
		.hour{
			width:8px;
			height:25%;
			background:black;
			z-index:3;
		}
		.min{
		width:5px;
		height:40%;
		background:black;
		z-index:4;
		}
		.sec{
		width:2px;
		height:43%;
		background:red;
		z-index:5;
		}
		.centerDot{
		width:14px;
		height:14px;
		background:black;
		border-radius:50%;
		position:absolute;
		top:50%;
		left:50%;
		transform:translate(-50%,-50%);
		z-index:10;
		border:2px solid black;
		}
		.number{
		position:absolute;
		width:100%;
		height:100%;
		text-align:center;
		font-size:1.4rem;
		font-weight:700;
		padding:15px;
		box-sizing:border-box;
		color:black;
		}
</style>
<body>

<div class='clock' id='clock'>
<div class='insideClock'>
<div class= 'hand hour' id='hourHand'></div>
<div class='hand min' id='minHand'></div>
<div class='hand sec' id ='secHand'></div>
</div>
<div class='centerDot' id ='centerDot'></div>
</div>
<script>
const clock = document.getElementById("clock");
const hourHand = document.getElementById("hourHand");
const minHand = document.getElementById("minHand");
const secHand = document.getElementById("secHand");
//creating number
for(let i = 1; i<=12;i++){
const numberContainer = document.createElement("div");
numberContainer.className = "number";
numberContainer.style.transform = `rotate(${i*30}deg)`;

const numText = document.createElement("div");
numText.innerText = i;
numText.style.transform = `rotate(-${i*30}deg)`;
numberContainer.appendChild(numText);
clock.appendChild(numberContainer);
}
function updateClock(){
const now = new Date();
const seconds = now.getSeconds();
const minutes = now.getMinutes();
const hours = now.getHours();

//calculate degree
const secDeg = (seconds/60) * 360;
const minDeg = (minutes/60) * 360 + (seconds /60 )* 6;
const hrDeg  = (hours % 12/12)  * 360 + (minutes /60) * 30;

//temporiarly disabling transition

if (seconds === 0){
secHand.style.transition = 'none';
}else{
secHand.style.transition = 'transform 0.1s cubic-bezier(0.4,2.08,0.55,0.44)';
}
if(minutes === 0 && seconds === 0){
minHand.style.transition = 'none';
}else{
minHand.style.transition = 'transform 0.1s cubic-bezier(0.4,2.08,0.55,0.44)';
}
if((hours % 12 ) === 0 && minutes === 0  && seconds === 0){
hourHand.style.transition='none';
}else{
hourHand.style.transition='transform 0.1s cubic-bezier(0.4,2.08,0.55,0.44)';
}

//Applying transformation
secHand.style.transform  = `translateX(-50%) rotate(${secDeg}deg)`;
minHand.style.transform  =`translateX(-50%) rotate(${minDeg}deg)`;
hourHand.style.transform = `translateX(-50%) rotate(${hrDeg}deg)`;

//restore translation
if(seconds === 0){
secHand.offsetHeight;
setTimeout(() =>{
secHand.style.transition='transform 0.1s cubic-bezier(0.4,2.08,0.55,0.44)';
},50);
}
if(minutes === 0 && seconds === 0){
minHand.offsetHeight;
setTimeout(()=>{
minHand.style.transition='transform 0.1s cubic-bezier(0.4,2.08,0.55,0.44)'
},50);
}
if((hours % 12)===0 && minutes === 0 && seconds === 0) {
secHand.offsetHeight;
setTimeout(()=>{
hourHand.style.transform='transform 0.1s cubic-bezier(0.4,2.08,0.55,0.44)'
},50);
}
}
setInterval(updateClock,1000);
updateClock();
</script>
</body>
